<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bone - blobs over nostr events</title>
  <link rel="icon" type="image/svg+xml" href="assets/bone.svg">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modal-toast.css">
</head>
<body>
  <header id="app-header">
    <div class="header-left">
      <img src="assets/bone.svg" alt="bone logo" class="logo">
      <h1>bone</h1>
      <span class="subtitle">blobs over nostr events</span>
    </div>
    <div class="header-right" id="header-actions"></div>
  </header>

  <main id="app-main">
    <section id="login-view" class="view active">
      <div class="login-card">
        <img src="assets/bone.svg" alt="bone" class="login-logo">
        <h2>Welcome to bone</h2>
        <p>Send and manage blobs over nostr events.</p>
        <div class="login-form">
          <label for="nlogin-input">Paste your nlogin string</label>
          <textarea id="nlogin-input" rows="3"
            placeholder="nlogin1..."></textarea>
          <button id="btn-login" class="btn btn-primary">
            Login with nlogin
          </button>
          <div class="divider"><span>or</span></div>
          <label for="nsec-input">Paste nsec / hex secret key</label>
          <input type="password" id="nsec-input"
            placeholder="nsec1... or hex">
          <button id="btn-nsec-login" class="btn btn-secondary">
            Login with nsec
          </button>
        </div>
      </div>
    </section>

    <section id="dashboard-view" class="view">
      <div class="toolbar">
        <h2>My Files</h2>
        <div class="toolbar-actions">
          <button id="btn-refresh" class="btn btn-icon" title="Refresh">
            &#x21bb;
          </button>
          <button id="btn-upload" class="btn btn-primary">
            + Upload File
          </button>
        </div>
      </div>
      <div id="file-list" class="file-grid">
        <div class="empty-state" id="empty-state">
          <p>No files uploaded yet.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal"></div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
